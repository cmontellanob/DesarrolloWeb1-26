<body>
 <script>
    function factorial(n)
    {
    fact=1;
    for (i=1;i<=n;i++)
     {
        fact*=i;
     }
     return fact;
    }
    n=prompt("Intruduzca el valor de  n");
     document.write("El factorial de "+n+" es "+factorial(n));

 </script>

    
</body>
