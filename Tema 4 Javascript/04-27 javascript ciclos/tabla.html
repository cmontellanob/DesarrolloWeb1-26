<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .celda {
            background-color: yellow;
            width: 50px;
        }
    </style>
</head>
<body>
    <script> 
    n=prompt("Intruduzca la cantidad de filas");
    m=prompt("Intruduzca la cantidad de columnas");
    document.write('<table border="1" >');
    for (i=0;i<n;i++)
    {
        document.write('<tr>');
        for (j=0;j<m;j++) 
        {
            document.write('<td class="celda">'+j+'</td>')
        }
        document.write('</tr>');
    }        
    document.write('</table>');
    </script>
    
</body>
</html>
