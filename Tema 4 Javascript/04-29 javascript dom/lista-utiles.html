<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <input type="text" id="util">
    <button>Añadir</button>
    Lista Utiles
    <ul>

    </ul>

    <script>
      document.querySelector('button').addEventListener('click',
        ()=>{
            valor=document.querySelector('#util').value;
            nuevoutil=document.createElement('li');
            nuevoutil.innerHTML=valor;
            document.querySelector('ul').appendChild(nuevoutil);      

        }
      )  

    </script>
    
</body>
</html>
